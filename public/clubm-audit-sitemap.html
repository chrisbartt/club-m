    .status-btn.harmonize .dot { background: var(--orange); }
    .status-btn.missing .dot { background: var(--red); }

    .drawer-section .content ul { margin-left: 20px; margin-top: 8px; }
    .drawer-section .content li { margin-bottom: 6px; }

</head>

// ========================================
// STATE
// ========================================
let currentFilter = 'all';
let statusFilters = { existing: true, harmonize: true, missing: true };
let roleFilters = { admin: true, membre: true, business: true };

// ========================================
// FILTER FUNCTIONS
// ========================================
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  applyFilters();
}
function toggleStatus(s) {
  statusFilters[s] = !statusFilters[s];
  document.querySelectorAll('.status-btn').forEach(b => {
    if (b.classList.contains(s)) { b.classList.toggle('active', statusFilters[s]); b.classList.toggle('inactive', !statusFilters[s]); }
  });
  applyFilters();
}
function toggleRole(r) {
  roleFilters[r] = !roleFilters[r];
  document.querySelectorAll('.role-btn').forEach(b => {
    if (b.classList.contains(r)) { b.classList.toggle('active', roleFilters[r]); b.classList.toggle('inactive', !roleFilters[r]); }
  });
  applyFilters();
}
function applyFilters() {
  document.querySelectorAll('.screen-card').forEach(c => {
    const p = c.dataset.priority, s = c.dataset.status, r = c.dataset.role;
    const pOk = currentFilter === 'all' || p === currentFilter;
    const sOk = statusFilters[s];
    const rOk = !r || roleFilters[r];
    c.classList.toggle('hidden', !(pOk && sOk && rOk));
  });
  updateCounts();
}

// ========================================
// RENDER
// ========================================
function render() {
  const container = document.getElementById('kanban-container');
  container.innerHTML = '';

  columns.forEach(col => {
    const items = Object.values(database).filter(d => d.category === col.id);
    const colEl = document.createElement('div');
    colEl.className = 'kanban-column';
    colEl.innerHTML = `
      <div class="column-header ${col.class}">
        <div><div class="title">${col.title}</div><span class="subtitle">${col.subtitle}</span></div>
        <div class="count-badge" id="count-${col.id}">${items.length}</div>
      </div>
      <div class="column-body" id="body-${col.id}"></div>`;

    const body = colEl.querySelector('.column-body');
    Object.entries(col.subcategories).forEach(([subId, subConfig]) => {
      const subItems = items.filter(d => d.subcategory === subId);
      if (!subItems.length) return;
      const group = document.createElement('div');
      group.className = 'level-group';
      group.innerHTML = `<div class="level-group-header ${subConfig.class}"><span>${subConfig.label}</span><span class="count">${subItems.length}</span></div>`;

      subItems.forEach(item => {
        const card = document.createElement('div');
        card.className = `screen-card ${item.status}`;
        card.dataset.priority = item.priority;
        card.dataset.status = item.status;
        card.dataset.role = item.role || '';
        card.onclick = () => openDrawer(item.id);
        const roleTag = item.role ? `<span class="role-tag ${item.role}">${item.role}</span>` : '';
        const blockTag = item.blocking ? '<span class="blocking-tag">⛔ Bloquant</span>' : '';
        const fInfo = item.fichier ? `<span>📁 ${item.fichier.split('/').pop()}</span>` : '<span>📁 À créer</span>';
        card.innerHTML = `
          <div class="main-info">
            <div class="name"><span class="status-indicator"></span>${item.name}</div>
            <div class="description">${item.description.substring(0, 120)}${item.description.length > 120 ? '…' : ''}</div>
            <div class="meta">${fInfo}</div>
          </div>
          <div class="tags">
            <span class="priority-tag ${item.priority}">${item.priority.toUpperCase()}</span>
            ${roleTag}${blockTag}
          </div>`;
        group.appendChild(card);
      });
      body.appendChild(group);
    });
    container.appendChild(colEl);
  });
  updateCounts();
  renderSummary();
}

// ========================================
// SUMMARY BAR
// ========================================
function renderSummary() {
  const all = Object.values(database);
  const ex = all.filter(d => d.status === 'existing').length;
  const ha = all.filter(d => d.status === 'harmonize').length;
  const mi = all.filter(d => d.status === 'missing').length;
  const total = all.length;
  const bar = document.getElementById('summary-bar');
  bar.innerHTML = `
    <div class="summary-block"><div class="sb-label">Total éléments</div><div class="sb-value">${total}</div></div>
    <div class="summary-divider"></div>
    <div class="summary-block"><div class="sb-label">✅ Existants</div><div class="sb-value green">${ex}</div></div>
    <div class="summary-block"><div class="sb-label">🟠 À corriger</div><div class="sb-value orange">${ha}</div></div>
    <div class="summary-block"><div class="sb-label">🔴 À créer</div><div class="sb-value red">${mi}</div></div>
    <div class="summary-divider"></div>
    <div class="summary-block"><div class="sb-label">MVP bloquants</div><div class="sb-value red">${all.filter(d => d.priority === 'mvp' && d.blocking).length}</div></div>
    <div class="summary-divider"></div>
    <div class="progress-bar-container">
      <div class="progress-bar-label">Progression globale</div>
      <div class="progress-bar">
        <div class="seg green" style="width:${(ex/total*100).toFixed(1)}%"></div>
        <div class="seg orange" style="width:${(ha/total*100).toFixed(1)}%"></div>
        <div class="seg red" style="width:${(mi/total*100).toFixed(1)}%"></div>
      </div>
    </div>`;
}

// ========================================
// COUNTS
// ========================================
function updateCounts() {
  const all = Object.values(database);
  const vis = all.filter(i => statusFilters[i.status] && (!i.role || roleFilters[i.role]));
  document.getElementById('count-all').textContent = vis.length;
  document.getElementById('count-mvp').textContent = vis.filter(d => d.priority === 'mvp').length;
  document.getElementById('count-v1').textContent = vis.filter(d => d.priority === 'v1').length;
  document.getElementById('count-v2').textContent = vis.filter(d => d.priority === 'v2').length;
  const e = vis.filter(d => d.category === 'ecrans').length;
  const n = vis.filter(d => d.category === 'notifications').length;
  const w = vis.filter(d => d.category === 'workflows').length;
  const a = vis.filter(d => d.category === 'ameliorations').length;
  document.getElementById('stat-ecrans').textContent = e;
  document.getElementById('stat-notifs').textContent = n;
  document.getElementById('stat-workflows').textContent = w;
  document.getElementById('stat-amelio').textContent = a;
  document.getElementById('stat-total').textContent = vis.length;
}

// ========================================
// DRAWER
// ========================================
function openDrawer(id) {
  const item = database[id];
  if (!item) return;
  document.getElementById('drawer-title').textContent = item.name;
  const meta = document.getElementById('drawer-meta');
  meta.innerHTML = `
    <span class="priority-tag ${item.priority}">${item.priority.toUpperCase()}</span>
    <span class="role-tag ${item.role||'admin'}">${item.role||'global'}</span>
    ${item.blocking ? '<span class="blocking-tag">⛔ BLOQUANT POUR LE TEST</span>' : ''}`;

  const body = document.getElementById('drawer-body');
  let h = '';
  const sL = { existing:'✅ Existant — Écran présent dans le code', harmonize:'🟠 À corriger / harmoniser', missing:'🔴 À créer — N\'existe pas encore' };
  const sC = { existing:'', harmonize:'warning', missing:'danger' };

  h += `<div class="drawer-section"><h3>Statut</h3><div class="info-card ${sC[item.status]}"><div class="value">${sL[item.status]}</div></div></div>`;
  h += `<div class="drawer-section"><h3>Priorité</h3><div class="priority-detail ${item.priority}"><div class="badge">${item.priority.toUpperCase()}</div><div>${item.priority==='mvp'?'<strong>Indispensable</strong> pour le test vendredi avec Mme Morel':''}${item.priority==='v1'?'<strong>Post-test</strong> — après validation MVP':''}${item.priority==='v2'?'<strong>Évolution future</strong>':''}</div></div></div>`;
  h += `<div class="drawer-section"><h3>Description</h3><div class="content">${item.description}</div></div>`;

  if (item.audit) h += `<div class="drawer-section"><h3>Résultat de l'audit</h3><div class="info-card info"><div class="value">${item.audit}</div></div></div>`;
  if (item.fichier) h += `<div class="drawer-section"><h3>Fichier source</h3><div class="info-card"><div class="label">Chemin</div><div class="value" style="font-family:monospace;font-size:12px">${item.fichier}</div></div></div>`;
  if (item.actions && item.actions.length) h += `<div class="drawer-section"><h3>Actions / Fonctionnalités</h3><div class="content"><ul>${item.actions.map(a=>`<li>${a}</li>`).join('')}</ul></div></div>`;
  if (item.etapes && item.etapes.length) h += `<div class="drawer-section"><h3>Étapes du workflow</h3><div class="content"><ul>${item.etapes.map(e=>`<li>${e}</li>`).join('')}</ul></div></div>`;
  if (item.declencheur) {
    h += `<div class="drawer-section"><h3>Détails notification</h3>
      <div class="info-card info"><div class="label">Déclencheur</div><div class="value">${item.declencheur}</div></div>
      ${item.canal?`<div class="info-card"><div class="label">Canal</div><div class="value">${item.canal}</div></div>`:''}
      ${item.contenu?`<div class="info-card"><div class="label">Contenu</div><div class="value">${item.contenu}</div></div>`:''}
    </div>`;
  }
  if (item.corrections && item.corrections.length) {
    h += `<div class="drawer-section"><h3>⚡ Actions requises</h3><div class="content"><ul>${item.corrections.map(c => {
      const crit = c.startsWith('CRÉER') || c.startsWith('CRITIQUE');
      return `<li style="${crit?'color:#fca5a5;font-weight:600':''}">${c}</li>`;
    }).join('')}</ul></div></div>`;
  }

  body.innerHTML = h;
  document.getElementById('drawer').classList.add('active');
  document.getElementById('drawer-overlay').classList.add('active');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('active');
  document.getElementById('drawer-overlay').classList.remove('active');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

render();
</script>
</body>
</html>
